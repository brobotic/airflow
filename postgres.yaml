services:
  postgres_movies:
    image: postgres:16
    container_name: postgres_movies
    restart: unless-stopped
    environment:
      POSTGRES_USER: movies_user
      POSTGRES_PASSWORD: movies_pass
      POSTGRES_DB: movies_db
    ports:
      - "5433:5432"   # Using 5433 on the host to avoid conflicts with Airflow's own postgres
    volumes:
      - postgres_movies_data:/var/lib/postgresql/data
    networks:
      - airflow_default
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies_user -d movies_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_movies
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@movies.com
      PGADMIN_DEFAULT_PASSWORD: admin_pass
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - airflow_default
    depends_on:
      postgres_movies:
        condition: service_healthy

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter_movies
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://movies_user:movies_pass@postgres_movies:5432/movies_db?sslmode=disable
    networks:
      - airflow_default
    ports:
      - "9187:9187"
    depends_on:
      postgres_movies:
        condition: service_healthy

volumes:
  postgres_movies_data:
    external: true
    name: postgres_movies_data
  pgadmin_data:
    name: pgadmin_data

networks:
  airflow_default:
    external: true  # Must match the network your Airflow compose uses

