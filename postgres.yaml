version: "3.8"

services:
  postgres_movies:
    image: postgres:16
    container_name: postgres_movies
    restart: unless-stopped
    environment:
      POSTGRES_USER: movies_user
      POSTGRES_PASSWORD: movies_pass
      POSTGRES_DB: movies_db
    ports:
      - "5433:5432"   # Using 5433 on the host to avoid conflicts with Airflow's own postgres
    volumes:
      - postgres_movies_data:/var/lib/postgresql/data
    networks:
      - airflow_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies_user -d movies_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_movies_data:

networks:
  airflow_default:
    external: true  # Must match the network your Airflow compose uses

