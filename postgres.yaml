version: "3.8"

services:
  postgres_movies:
    image: postgres:16
    container_name: postgres_movies
    restart: unless-stopped
    environment:
      POSTGRES_USER: movies_user
      POSTGRES_PASSWORD: movies_pass
      POSTGRES_DB: movies_db
    ports:
      - "5433:5432"   # Using 5433 on the host to avoid conflicts with Airflow's own postgres
    volumes:
      - postgres_movies_data:/var/lib/postgresql/data
    networks:
      - airflow_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies_user -d movies_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_movies
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@movies.local
      PGADMIN_DEFAULT_PASSWORD: admin_pass
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - airflow_default
    depends_on:
      postgres_movies:
        condition: service_healthy

volumes:
  postgres_movies_data:
  pgadmin_data:

networks:
  airflow_default:
    external: true  # Must match the network your Airflow compose uses

